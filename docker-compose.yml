services:
  postgres:
    image: postgres:16-alpine
    container_name: salonzap-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: salonzap
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - salonzap_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d salonzap"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  salonzap_pgdata:
